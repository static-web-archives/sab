<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sabine Hort — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Kanit:wght@200;400;600&display=swap" rel="stylesheet" />

<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --surface: #111111;
  --border:  #222222;
  --text:    #e8e0d4;
  --muted:   #555;
  --accent:  #e2c98a;
  --gap:     10px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  cursor: crosshair;
}

/* grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.03;
  pointer-events: none;
  z-index: 9999;
}

/* ─── HEADER ─── */
header {
  position: sticky;
  top: 0;
  z-index: 500;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  padding: 0 2.5rem;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo { display: flex; align-items: center; text-decoration: none; }

.logo-svg {
  height: 38px;
  width: auto;
  display: block;
}

.hdr-right {
  font-family: 'Kanit', sans-serif;
  font-weight: 200;
  font-size: 0.62rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ─── FILTER BAR ─── */
.filter-wrap {
  padding: 1.6rem 2.5rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}

.filter-eyebrow {
  font-family: 'Kanit', sans-serif;
  font-weight: 200;
  font-size: 0.58rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 8px;
}

.pill {
  font-family: 'Kanit', sans-serif;
  font-weight: 400;
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.22s ease;
  position: relative;
  border-radius: 999px;
}

.pill:hover { color: var(--text); border-color: #444; }

.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
}

.pill-count { font-size: 0.54rem; opacity: 0.65; margin-left: 4px; }

/* ─── MASONRY ─── */
.gallery { padding: 1.4rem 2.5rem 5rem; }

.masonry {
  columns: 4;
  column-gap: var(--gap);
}

@media (max-width: 1280px) { .masonry { columns: 3; } }
@media (max-width: 860px)  { .masonry { columns: 2; } }
@media (max-width: 500px)  { .masonry { columns: 1; } }

/* CARD */
.card {
  break-inside: avoid;
  margin-bottom: var(--gap);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: var(--surface);
  display: block;
}

.card img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.55s cubic-bezier(0.22, 0.61, 0.36, 1),
              filter 0.4s ease;
  filter: brightness(0.9) saturate(0.8);
}

.card:hover img {
  transform: scale(1.05);
  filter: brightness(1.05) saturate(1);
}

.card-veil {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, transparent 45%, rgba(0,0,0,0.75) 100%);
  opacity: 0;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: flex-end;
  padding: 0.9rem;
  pointer-events: none;
}

.card:hover .card-veil { opacity: 1; }

.card-meta { display: flex; flex-direction: column; gap: 3px; }

.card-cat {
  font-family: 'Kanit', sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 400;
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 0.92rem;
  color: var(--text);
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
.card { animation: fadeUp 0.48s ease both; }

/* ─── LIGHTBOX ─── */
.lb {
  position: fixed;
  inset: 0;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.32s ease;
}
.lb.open { opacity: 1; pointer-events: all; }

.lb-bg {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.94);
  backdrop-filter: blur(16px);
  cursor: pointer;
}

.lb-frame {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  transform: scale(0.93) translateY(10px);
  transition: transform 0.36s cubic-bezier(0.22, 0.61, 0.36, 1);
  max-width: 94vw;
}
.lb.open .lb-frame { transform: scale(1) translateY(0); }

.lb-img-wrap {
  position: relative;
  line-height: 0;
  box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 0 1px #1e1e1e;
}
.lb-img-wrap img {
  display: block;
  max-width: 88vw;
  max-height: 82vh;
  object-fit: contain;
}

.lb-close {
  position: absolute;
  top: -12px;
  right: -12px;
  width: 30px;
  height: 30px;
  background: var(--accent);
  border: none;
  color: #000;
  font-family: 'Kanit', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  z-index: 2;
}
.lb-close:hover { background: #fff; }

.lb-bottom {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.lb-info { display: flex; align-items: center; gap: 10px; }

.lb-info-cat {
  font-family: 'Kanit', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
}
.lb-info-sep { color: #333; }
.lb-info-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 0.95rem;
  color: var(--text);
}

.lb-controls { display: flex; align-items: center; gap: 8px; }

.lb-counter {
  font-family: 'Kanit', sans-serif;
  font-weight: 200;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  color: var(--muted);
}

.lb-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.lb-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }

/* ─── FOOTER ─── */
footer {
  border-top: 1px solid var(--border);
  padding: 1.2rem 2.5rem;
  display: flex;
  justify-content: space-between;
}
footer span {
  font-family: 'Kanit', sans-serif;
  font-weight: 200;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}
</style>
</head>

    const d = document.createElement('div');
    d.className = 'card';
    d.style.animationDelay = Math.min(i * 40, 560) + 'ms';
    d.innerHTML =
      `<img src="${src(p)}" alt="${p.title}" loading="lazy" width="${p.w}" height="${p.h}">` +
      `<div class="card-veil"><div class="card-meta">` +
        `<span class="card-cat">${p.cat}</span>` +
        `<span class="card-title">${p.title}</span>` +
      `</div></div>`;
    d.addEventListener('click', () => openLB(i));
    masonry.appendChild(d);
  });
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    render();
  });
});

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
const lb        = document.getElementById('lb');
const lbImg     = document.getElementById('lbImg');
const lbCat     = document.getElementById('lbCat');
const lbTitle   = document.getElementById('lbTitle');
const lbCounter = document.getElementById('lbCounter');

function updateLB() {
  const p = visible[lbIdx];
  lbImg.src = src(p);
  lbImg.alt = p.title;
  lbCat.textContent   = p.cat;
  lbTitle.textContent = p.title;
  lbCounter.textContent = (lbIdx + 1) + ' / ' + visible.length;
}

function openLB(i) {
  lbIdx = i;
  updateLB();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lbClose').addEventListener('click', closeLB);
document.getElementById('lbBg').addEventListener('click', closeLB);

document.getElementById('lbPrev').addEventListener('click', () => {
  lbIdx = (lbIdx - 1 + visible.length) % visible.length;
  updateLB();
});

document.getElementById('lbNext').addEventListener('click', () => {
  lbIdx = (lbIdx + 1) % visible.length;
  updateLB();
});

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLB();
  if (e.key === 'ArrowLeft')  { lbIdx = (lbIdx - 1 + visible.length) % visible.length; updateLB(); }
  if (e.key === 'ArrowRight') { lbIdx = (lbIdx + 1) % visible.length; updateLB(); }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
